name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEFAULT_DEPLOY_HOST: 178.62.61.40
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true
            sandbox = false

      - uses: cachix/cachix-action@v15
        with:
          name: albion
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          key_material="${SSH_KEY:-}"
          if [ -z "$key_material" ]; then
            key_material="${DEPLOY_SSH_KEY:-}"
          fi
          if [ -z "$key_material" ]; then
            key_material="${SSH_PRIVATE_KEY:-}"
          fi
          if [ -z "$key_material" ]; then
            echo "Missing SSH private key secret. Set one of: SSH_KEY, DEPLOY_SSH_KEY, SSH_PRIVATE_KEY" >&2
            exit 1
          fi
          printf '%b\n' "$key_material" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            echo "Invalid SSH private key secret: unable to parse ~/.ssh/id_ed25519" >&2
            exit 1
          fi

      - name: Resolve host IP
        run: |
          if [ -n "${{ secrets.DEPLOY_HOST }}" ]; then
            host_ip="${{ secrets.DEPLOY_HOST }}"
            echo "Using DEPLOY_HOST secret"
          elif [ -n "$DEFAULT_DEPLOY_HOST" ]; then
            host_ip="$DEFAULT_DEPLOY_HOST"
            echo "Using default branch deploy host"
          else
            host_ip=$(nix run .#resolveIp -- -i ~/.ssh/id_ed25519)
            echo "Using resolved host IP from terraform state"
          fi
          if ! echo "$host_ip" | grep -Eq '^([0-9]{1,3}\.){3}[0-9]{1,3}$'; then
            echo "Resolve host IP failed: invalid IPv4 '$host_ip'" >&2
            exit 1
          fi
          echo "::add-mask::$host_ip"
          echo "HOST_IP=$host_ip" >> "$GITHUB_ENV"

      - name: Trust host key
        run: |
          host_key=$(nix eval --raw --file keys.nix keys.host)
          echo "$HOST_IP $host_key" > ~/.ssh/known_hosts

      - run: ./prep.sh

      - name: Build and deploy
        env:
          DEPLOY_HOST: ${{ env.HOST_IP }}
        run: nix run .#deployService -- rest-api
